<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembacaan Tarot | Fauzan Tarot</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f0518;
            --gold-accent: #d4af37;
            --gold-light: #f3e5ab;
            --text-main: #e0e0e0;
            --glass-bg: rgba(20, 5, 30, 0.90);
        }

        body {
            font-family: 'Lora', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://i.imgur.com/XMpaq1Z.jpeg');
            background-size: cover;
            background-position: center;
            filter: brightness(0.3) blur(4px);
            z-index: -1;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: var(--gold-light);
            font-size: 0.9rem;
            opacity: 0.7;
            z-index: 10;
        }

        .container {
            background-color: var(--glass-bg);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            text-align: center;
            max-width: 1000px; 
            width: 100%;
            margin-top: 40px;
            animation: fadeIn 1s ease-out;
        }

        .site-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold-accent);
            margin-bottom: 15px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold-accent);
            margin-bottom: 10px;
            font-size: 2.2em;
        }

        select#spreadSelect {
            background-color: rgba(0, 0, 0, 0.3);
            color: var(--gold-light);
            border: 1px solid var(--gold-accent);
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            width: 100%;
            max-width: 300px;
        }

        select#spreadSelect option { background-color: var(--bg-dark); }

        #drawCardsBtn {
            background-color: var(--gold-accent);
            color: var(--bg-dark);
            border: none;
            padding: 15px 40px;
            font-family: 'Playfair Display', serif;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        #drawCardsBtn:hover {
            background-color: #ffd680;
            transform: translateY(-2px);
        }

        #drawCardsBtn:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        .tarot-spread {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 30px;
            min-height: 50px;
        }

        .card-slot {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            width: 200px; 
            min-height: 320px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            box-sizing: border-box;
            animation: popIn 0.5s ease forwards;
        }

        .card-slot.revealed { border-color: var(--gold-accent); }

        .card-position-label {
            font-size: 0.8em;
            color: var(--gold-light);
            margin-bottom: 10px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            width: 100%;
            text-align: center;
        }

        .card-slot img {
            width: 100%;
            height: auto;
            max-height: 200px;
            object-fit: contain;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .card-placeholder { font-size: 3rem; margin: 20px 0; }

        .card-name-text {
            color: var(--gold-accent);
            font-weight: 600;
            margin-top: auto;
            font-family: 'Playfair Display', serif;
        }

        .interpretations {
            text-align: left;
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .interpretation-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            border-left: 3px solid var(--gold-accent);
        }

        .interpretation-item h3 {
            color: var(--gold-light);
            margin-top: 0;
            font-family: 'Playfair Display', serif;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        @media (max-width: 768px) {
            .card-slot { width: 100%; flex-direction: row; min-height: auto; text-align: left; gap: 15px; }
            .card-slot img { width: 60px; height: auto; margin: 0; }
            .card-position-label { position: absolute; top: 5px; right: 10px; width: auto; border: none; font-size: 0.7em;}
            .card-placeholder { font-size: 2rem; margin: 0; }
        }
    </style>
</head>

        // KONFIGURASI SPREAD
        const spreadTypes = {
            "daily": ["Pesan Semesta"],
            "time": ["Masa Lalu", "Saat Ini", "Masa Depan"],
            "love": ["Perasaanmu", "Perasaan Dia", "Potensi Hubungan"],
            "problem": ["Situasi Awal", "Akar Masalah", "Saran Semesta", "Hasil Akhir"]
        };

        const drawCardsBtn = document.getElementById('drawCardsBtn');
        const tarotSpreadDiv = document.getElementById('tarotSpread');
        const cardInterpretationsDiv = document.getElementById('cardInterpretations');
        const spreadSelect = document.getElementById('spreadSelect');

        // FUNGSI UTAMA
        drawCardsBtn.addEventListener('click', function() {
            try {
                // 1. Ambil Pilihan Spread
                const selectedKey = spreadSelect.value;
                const positions = spreadTypes[selectedKey];
                const count = positions.length;

                // 2. Ubah Tombol
                drawCardsBtn.disabled = true;
                drawCardsBtn.innerText = "Mengacak Kartu...";
                tarotSpreadDiv.innerHTML = '';
                cardInterpretationsDiv.innerHTML = '';

                // 3. Kocok Kartu
                const shuffled = [...tarotCards].sort(() => 0.5 - Math.random());
                const selected = shuffled.slice(0, count);

                // 4. Tampilkan Kartu Satu per Satu
                let delay = 0;
                selected.forEach((card, index) => {
                    setTimeout(() => {
                        const slot = document.createElement('div');
                        slot.className = 'card-slot';
                        
                        // Label Posisi
                        const label = document.createElement('div');
                        label.className = 'card-position-label';
                        label.innerText = positions[index];
                        slot.appendChild(label);

                        // Gambar / Placeholder
                        if(card.image) {
                            const img = document.createElement('img');
                            img.src = card.image;
                            slot.appendChild(img);
                        } else {
                            const place = document.createElement('div');
                            place.className = 'card-placeholder';
                            place.innerText = "🔮";
                            slot.appendChild(place);
                        }

                        // Nama Kartu
                        const name = document.createElement('div');
                        name.className = 'card-name-text';
                        name.innerText = card.name;
                        slot.appendChild(name);

                        slot.classList.add('revealed');
                        tarotSpreadDiv.appendChild(slot);

                        // Scroll ke kartu yang baru muncul
                        slot.scrollIntoView({behavior: "smooth", block: "center"});

                        // Jika kartu terakhir, tampilkan teks
                        if(index === count - 1) {
                            setTimeout(() => {
                                showText(selected, positions);
                                drawCardsBtn.disabled = false;
                                drawCardsBtn.innerText = "Ambil Kartu Lain";
                            }, 500);
                        }

                    }, delay);
                    delay += 600; // Jeda antar kartu
                });

            } catch (err) {
                alert("Terjadi kesalahan: " + err.message);
                drawCardsBtn.disabled = false;
            }
        });

        function showText(cards, positions) {
            cards.forEach((card, index) => {
                const item = document.createElement('div');
                item.className = 'interpretation-item';
                
                const title = document.createElement('h3');
                title.innerText = card.name + " (" + positions[index] + ")";
                item.appendChild(title);

                const p = document.createElement('p');
                // Logika Makna Simpel
                let text = card.meaning_present || "Energi kartu ini sedang aktif.";
                if(positions[index].toLowerCase().includes('lalu')) text = card.meaning_past || text;
                if(positions[index].toLowerCase().includes('depan') || positions[index].toLowerCase().includes('potensi')) text = card.meaning_future || text;
                
                p.innerText = text;
                item.appendChild(p);
                cardInterpretationsDiv.appendChild(item);
            });
            
            // Scroll ke interpretasi
            setTimeout(() => {
                cardInterpretationsDiv.scrollIntoView({behavior: "smooth"});
            }, 100);
        }

    </script>
